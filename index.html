<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CRP-5"/>
<title>CRP-5 Flight Computer</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:'DM Mono',monospace;-webkit-font-smoothing:antialiased;min-height:100dvh}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
.app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:#0d0d16}
header{padding:20px 20px 0;background:linear-gradient(180deg,#13131f 0%,#0d0d16 100%);border-bottom:1px solid #1e1e30;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.logo{width:38px;height:38px;border-radius:10px;background:conic-gradient(from 135deg,#f59e0b,#ef4444,#6366f1,#10b981,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-text h1{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px}
.header-text p{font-size:10px;color:#555568;letter-spacing:1px;text-transform:uppercase}
.tabs{display:flex;border-bottom:1px solid #1e1e30;margin:0 -20px}
.tab-btn{flex:1;padding:10px 4px;background:none;border:none;color:#555568;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;position:relative;transition:color 0.2s;letter-spacing:0.3px}
.tab-btn.active{color:#e8e8f0}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:10%;width:80%;height:2px;border-radius:2px 2px 0 0;background:linear-gradient(90deg,#f59e0b,#6366f1)}
.tab-content{display:flex;flex-direction:column;gap:16px;padding:20px 16px 100px}
.card{background:#13131f;border-radius:16px;border:1px solid #1e1e30;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca,#6366f1);opacity:0.8}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:14px 16px 10px;color:#c8c8d8;border-bottom:1px solid #1e1e30}
.card-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
label{font-size:10px;color:#666680;text-transform:uppercase;letter-spacing:0.8px}
.unit{color:#444458;text-transform:none;letter-spacing:0}
input[type=number]{background:#0a0a12;border:1px solid #222235;border-radius:10px;padding:10px 12px;color:#e8e8f0;font-family:'DM Mono',monospace;font-size:15px;width:100%;-moz-appearance:textfield}
input[type=number]:focus{outline:none;border-color:#6366f1;background:#0c0c18}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.results{background:#0a0a12;border-radius:10px;border:1px solid #1e1e2e;overflow:hidden}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #131320}
.rrow:last-child{border-bottom:none}
.rrow.acc{background:linear-gradient(90deg,rgba(99,102,241,0.08) 0%,transparent 100%)}
.rl{font-size:11px;color:#666680;letter-spacing:0.3px}
.rv{font-size:15px;color:#e8e8f0;font-weight:500}
.rrow.acc .rv{color:#a5b4fc}
.hint{font-size:10px;color:#444458;text-align:center}
.wind-svg{width:100%;max-width:180px;display:block;margin:8px auto;background:#0a0a12;border-radius:50%;border:1px solid #1e1e2e}
.conv-wrap{background:#13131f;border-radius:16px;border:1px solid #1e1e30;padding:16px;position:sticky;top:89px;z-index:50}
.conv-label{font-size:10px;color:#666680;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.conv-input{background:#0a0a12;border:1px solid #6366f1;border-radius:10px;padding:12px 16px;color:#e8e8f0;font-family:'DM Mono',monospace;font-size:20px;width:100%;-moz-appearance:textfield}
.conv-input:focus{outline:none;border-color:#a5b4fc}
.conv-input::-webkit-outer-spin-button,.conv-input::-webkit-inner-spin-button{-webkit-appearance:none}
main{flex:1;overflow-y:auto}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const toRad = d => d*Math.PI/180;
const toDeg = r => r*180/Math.PI;
const mod360 = x => ((x%360)+360)%360;

function Field({label,value,onChange,unit}){
  return <div className="field">
    <label>{label}{unit&&<span className="unit"> {unit}</span>}</label>
    <input type="number" value={value} onChange={onChange?e=>onChange(e.target.value):undefined} readOnly={!onChange}/>
  </div>
}
function Res({label,value,unit,acc}){
  const v = value!==''&&value!==null&&!isNaN(value)?`${value}${unit?' '+unit:''}`:'—';
  return <div className={`rrow${acc?' acc':''}`}><span className="rl">{label}</span><span className="rv">{v}</span></div>
}
function Card({title,color,children}){
  return <div className="card" style={{'--ca':color}}>
    <div className="card-title">{title}</div>
    <div className="card-body">{children}</div>
  </div>
}

function CalcTab(){
  const [cas,setCas]=useState('');const [alt,setAlt]=useState('');const [oat,setOat]=useState('');
  const [ff,setFf]=useState('');const [ft,setFt]=useState('');
  const [dist,setDist]=useState('');const [spd,setSpd]=useState('');
  const [dr,setDr]=useState('');const [dt,setDt]=useState('');

  const isa=()=>{const h=parseFloat(alt);return isNaN(h)?'':Math.round((15-1.98*(h/1000))*10)/10};
  const tas=()=>{
    const c=parseFloat(cas),h=parseFloat(alt),t=parseFloat(oat);
    if([c,h,t].some(isNaN))return'';
    const isaT=15-1.98*(h/1000);
    const pr=Math.pow(1-0.0000226*h,5.256);
    const dr2=pr/((t+273.15)/(isaT+273.15));
    return Math.round(c/Math.sqrt(dr2));
  };
  const fuel=()=>{const f=parseFloat(ff),t=parseFloat(ft);return isNaN(f)||isNaN(t)?'':Math.round(f*(t/60)*10)/10};
  const calcTime=()=>{
    const d=parseFloat(dist),s=parseFloat(spd);
    if(isNaN(d)||isNaN(s)||s===0)return'';
    const m=(d/s)*60,h=Math.floor(m/60),mn=Math.round(m%60);
    return h>0?`${h}h ${mn}min`:`${mn} min`;
  };
  const calcDist2=()=>{const t=parseFloat(ft),s=parseFloat(spd);return isNaN(t)||isNaN(s)?'':Math.round(s*t/60*10)/10};
  const angle=()=>{
    const r=parseFloat(dr),v=parseFloat(dt);
    return isNaN(r)||isNaN(v)||v===0?'':Math.round(toDeg(Math.atan(r/(v*101.3)))*10)/10;
  };
  const grad=()=>{
    const r=parseFloat(dr),v=parseFloat(dt);
    return isNaN(r)||isNaN(v)||v===0?'':Math.round((r/(v*101.3))*1000*10)/10;
  };

  return <div className="tab-content">
    <Card title="✈ TAS depuis CAS / Alt / OAT" color="#f59e0b">
      <Field label="CAS" value={cas} onChange={setCas} unit="kt"/>
      <Field label="Altitude-pression" value={alt} onChange={setAlt} unit="ft"/>
      <Field label="OAT" value={oat} onChange={setOat} unit="°C"/>
      <div className="results"><Res label="Temp ISA" value={isa()} unit="°C"/><Res label="TAS" value={tas()} unit="kt" acc/></div>
    </Card>
    <Card title="⛽ Carburant" color="#10b981">
      <Field label="Débit carburant" value={ff} onChange={setFf} unit="L/h"/>
      <Field label="Durée vol" value={ft} onChange={setFt} unit="min"/>
      <div className="results"><Res label="Carburant brûlé" value={fuel()} unit="L" acc/></div>
    </Card>
    <Card title="🕐 Temps / Distance" color="#6366f1">
      <Field label="Distance" value={dist} onChange={setDist} unit="nm"/>
      <Field label="Vitesse sol" value={spd} onChange={setSpd} unit="kt"/>
      <div className="results">
        <Res label="Temps de vol" value={calcTime()} acc/>
        <Res label="Distance (si durée ci-dessus)" value={calcDist2()} unit="nm"/>
      </div>
    </Card>
    <Card title="📉 Descente" color="#ef4444">
      <Field label="Taux de descente" value={dr} onChange={setDr} unit="ft/min"/>
      <Field label="TAS" value={dt} onChange={setDt} unit="kt"/>
      <div className="results"><Res label="Angle" value={angle()} unit="°" acc/><Res label="Gradient" value={grad()} unit="ft/nm"/></div>
    </Card>
  </div>
}

function WindTab(){
  const [hdg,setHdg]=useState('');const [tas,setTas]=useState('');
  const [wd,setWd]=useState('');const [ws,setWs]=useState('');
  const [tr,setTr]=useState('');const [gs,setGs]=useState('');
  const [rwd,setRwd]=useState('');const [rws,setRws]=useState('');

  const res=()=>{
    const H=parseFloat(hdg),T=parseFloat(tas),WD=parseFloat(wd),WS=parseFloat(ws);
    if([H,T,WD,WS].some(isNaN))return null;
    const a=toRad(WD-H),cw=WS*Math.sin(a),hw=WS*Math.cos(a);
    const gspd=T-hw,wca=toDeg(Math.asin(Math.min(1,Math.max(-1,cw/T))));
    return{gs:Math.round(gspd),wca:Math.round(wca*10)/10,track:Math.round(mod360(H+wca)),hw:Math.round(hw),cw:Math.round(Math.abs(cw)),cwDir:cw>0?'Droite':'Gauche',hwType:hw>0?'Face':'Arrière'};
  };
  const resRev=()=>{
    const TR=parseFloat(tr),GS=parseFloat(gs),WD=parseFloat(rwd),WS=parseFloat(rws);
    if([TR,GS,WD,WS].some(isNaN))return null;
    let h=TR;
    for(let i=0;i<20;i++){const a=toRad(WD-h),cw=WS*Math.sin(a),hw=WS*Math.cos(a),t=GS+hw;if(t<=0)return null;h=mod360(TR-toDeg(Math.asin(Math.min(1,Math.max(-1,cw/t)))))}
    const a=toRad(WD-h),cw=WS*Math.sin(a),hw=WS*Math.cos(a),t=GS+hw;
    return{hdg:Math.round(mod360(h)),tas:Math.round(t),wca:Math.round(toDeg(Math.asin(Math.min(1,Math.max(-1,cw/t))))*10)/10};
  };
  const r=res(),rr=resRev();

  const Diagram=()=>{
    if(!r)return null;
    const H=parseFloat(hdg),WD=parseFloat(wd),WS=parseFloat(ws),T=parseFloat(tas);
    const sc=0.55,cx=100,cy=100;
    const tx=cx+T*sc*Math.sin(toRad(H)),ty=cy-T*sc*Math.cos(toRad(H));
    const wt=mod360(WD+180),wx=tx+WS*sc*Math.sin(toRad(wt)),wy=ty-WS*sc*Math.cos(toRad(wt));
    return <svg viewBox="0 0 200 200" className="wind-svg">
      <defs>
        <marker id="a1" markerWidth="5" markerHeight="5" refX="3" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5Z" fill="#6366f1"/></marker>
        <marker id="a2" markerWidth="5" markerHeight="5" refX="3" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5Z" fill="#10b981"/></marker>
      </defs>
      <circle cx={cx} cy={cy} r={2} fill="#f59e0b"/>
      <line x1={cx} y1={cy} x2={tx} y2={ty} stroke="#6366f1" strokeWidth="2" markerEnd="url(#a1)"/>
      <line x1={tx} y1={ty} x2={wx} y2={wy} stroke="#ef4444" strokeWidth="1.5" strokeDasharray="4"/>
      <line x1={cx} y1={cy} x2={wx} y2={wy} stroke="#10b981" strokeWidth="2" markerEnd="url(#a2)"/>
      <text x={cx-8} y={cy-6} fill="#888" fontSize="8">A/C</text>
      <text x={tx+3} y={ty} fill="#6366f1" fontSize="8">TAS</text>
      <text x={wx+3} y={wy} fill="#10b981" fontSize="8">GS</text>
    </svg>
  };

  return <div className="tab-content">
    <Card title="🧭 Cap → Route (avec vent)" color="#6366f1">
      <div className="two-col">
        <Field label="Cap vrai" value={hdg} onChange={setHdg} unit="°"/>
        <Field label="TAS" value={tas} onChange={setTas} unit="kt"/>
        <Field label="Vent de" value={wd} onChange={setWd} unit="°"/>
        <Field label="Vitesse vent" value={ws} onChange={setWs} unit="kt"/>
      </div>
      <Diagram/>
      {r&&<div className="results">
        <Res label="Vitesse sol (GS)" value={r.gs} unit="kt" acc/>
        <Res label="Route vraie" value={r.track} unit="°" acc/>
        <Res label="Correction vent (WCA)" value={r.wca} unit="°"/>
        <Res label="Vent de face/arrière" value={`${Math.abs(r.hw)} kt ${r.hwType}`}/>
        <Res label="Vent traversier" value={`${r.cw} kt ${r.cwDir}`}/>
      </div>}
    </Card>
    <Card title="🔁 Route → Cap (inverse)" color="#f59e0b">
      <div className="two-col">
        <Field label="Route souhaitée" value={tr} onChange={setTr} unit="°"/>
        <Field label="Vitesse sol visée" value={gs} onChange={setGs} unit="kt"/>
        <Field label="Vent de" value={rwd} onChange={setRwd} unit="°"/>
        <Field label="Vitesse vent" value={rws} onChange={setRws} unit="kt"/>
      </div>
      {rr&&<div className="results">
        <Res label="Cap à tenir" value={rr.hdg} unit="°T" acc/>
        <Res label="TAS nécessaire" value={rr.tas} unit="kt" acc/>
        <Res label="WCA" value={rr.wca} unit="°"/>
      </div>}
    </Card>
  </div>
}

function ConvTab(){
  const [val,setVal]=useState('');
  const v=parseFloat(val);
  const groups=[
    {title:'🌡 Température',color:'#ef4444',items:[
      {l:'°C → °F',f:()=>Math.round((v*9/5+32)*10)/10},
      {l:'°F → °C',f:()=>Math.round(((v-32)*5/9)*10)/10},
      {l:'°C → K',f:()=>Math.round((v+273.15)*10)/10},
    ]},
    {title:'📏 Distance',color:'#10b981',items:[
      {l:'nm → km',f:()=>Math.round(v*1.852*100)/100},
      {l:'km → nm',f:()=>Math.round(v/1.852*100)/100},
      {l:'ft → m',f:()=>Math.round(v*0.3048*10)/10},
      {l:'m → ft',f:()=>Math.round(v/0.3048*10)/10},
    ]},
    {title:'⚡ Vitesse',color:'#6366f1',items:[
      {l:'kt → km/h',f:()=>Math.round(v*1.852*10)/10},
      {l:'km/h → kt',f:()=>Math.round(v/1.852*10)/10},
      {l:'kt → m/s',f:()=>Math.round(v*0.5144*100)/100},
      {l:'kt → mph',f:()=>Math.round(v*1.15078*100)/100},
    ]},
    {title:'⛽ Volume / Poids',color:'#f59e0b',items:[
      {l:'L → US Gal',f:()=>Math.round(v*0.264172*1000)/1000},
      {l:'US Gal → L',f:()=>Math.round(v*3.78541*100)/100},
      {l:'Imp Gal → L',f:()=>Math.round(v*4.54609*100)/100},
      {l:'kg → lbs',f:()=>Math.round(v*2.20462*100)/100},
      {l:'lbs → kg',f:()=>Math.round(v*0.453592*100)/100},
    ]},
    {title:'🔵 Pression',color:'#8b5cf6',items:[
      {l:'hPa → inHg',f:()=>Math.round(v*0.02953*10000)/10000},
      {l:'inHg → hPa',f:()=>Math.round(v*33.8639*100)/100},
    ]},
  ];
  return <div className="tab-content">
    <div className="conv-wrap">
      <div className="conv-label">Valeur à convertir</div>
      <input type="number" className="conv-input" value={val} onChange={e=>setVal(e.target.value)} placeholder="Entrez un nombre..."/>
    </div>
    {groups.map(g=><Card key={g.title} title={g.title} color={g.color}>
      <div className="results">
        {g.items.map(it=>{
          const r=!isNaN(v)?it.f():null;
          return <Res key={it.l} label={it.l} value={r!==null?r:''}/>;
        })}
      </div>
    </Card>)}
  </div>
}

const TABS=['Calculs','Navigation Vent','Conversions'];
function App(){
  const [tab,setTab]=useState(0);
  return <div className="app">
    <header>
      <div className="header-top">
        <div className="logo">✈</div>
        <div className="header-text">
          <h1>CRP-5 Digital</h1>
          <p>Pooley's Flight Computer</p>
        </div>
      </div>
      <div className="tabs">
        {TABS.map((t,i)=><button key={t} className={`tab-btn${tab===i?' active':''}`} onClick={()=>setTab(i)}>{t}</button>)}
      </div>
    </header>
    <main>
      {tab===0&&<CalcTab/>}
      {tab===1&&<WindTab/>}
      {tab===2&&<ConvTab/>}
    </main>
  </div>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
